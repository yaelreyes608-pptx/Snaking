<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Snaking</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <section id="auth-screen" class="auth-container">
            <div class="card"> 
                <h1>Snaking</h1>
        
                <div id="login-container">
                    <p>Login to play</p>
                    <form id="login-form">
                        <input type="text" id="username" placeholder="User" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" class="btn-primary">Enter</button>
                    </form>
                    <p>You don't have an account? <a href="#" onclick="toggleAuth()">Sign up</a></p>
                </div>

                <div id="register-container" class="hidden">
                    <p>Create an account</p>
                    <form id="register-form">
                        <input type="text" id="reg-username" placeholder="New User" required>
                        <input type="password" id="reg-password" placeholder="New Password" required>
                        <button type="submit" class="btn-success">Register</button>
                    </form>
                    <p>Have an account? <a href="#" onclick="toggleAuth()">Log in</a></p>
                </div>
            </div>
        </section>

        <section id="mode-screen" class="auth-container hidden">
            <div class="card">
                <h1>Selecciona el modo</h1>
                <div class="mode-options">
                    <button onclick="selecmode('single')" class="btn-primary">Singleplayer</button>
                    <button onclick="selecmode('pvp')" class="btn-primary">Player vs Player</button>
                    <button onclick="selecmode('pve')" class="btn-primary">Player vs IA</button>
                    <button onclick="showScoreboard()" class="btn-primary" style="background-color: #d17171;">See scoreboard</button>
                </div>
            </div>
        </section>

        <section id="scoreboard-screen" class="auth-container hidden">
            <div class="card">
                <h2>Mejores Jugadores</h2>
                <div style="display: flex; justify-content: space-around; text-align: left; margin: 20px 0;">
                    <div>
                        <h3 style="color: #ffffff;">Singleplayer</h3>
                        <ol id="top-single" style="padding-left: 20px;"></ol>
                    </div>
                    <div>
                        <h3 style="color: #ffffff;">Player vs IA</h3>
                        <ol id="top-pve" style="padding-left: 20px;"></ol>
                    </div>
                </div>
                <button onclick="backToMenu()" class="btn-primary" style="width: 100%;">Return to menu</button>
            </div>
        </section>

        <main id="game-screen" class="hidden">
            <header>
                <div class="scoreboard">
                    <span>Player 1: <b id="score1">0</b></span>
                    <span id="p2-score-container" class="hidden"> | Player 2: <b id="score2">0</b></span>
                </div>
                <div class="control-panel">
                    <button onclick="backToMenuFromGame()" class="btn-primary">Leave match</button>
                </div>
            </header>

            <div>
                <canvas id="game" width="640" height="640"></canvas>
            </div>

            <footer>
                <p>Controls: P1 = WASD | P2 = ↑←↓→</p>
            </footer>
        </main>

        <script>
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const authScreen = document.getElementById('auth-screen');
            const modeScreen = document.getElementById('mode-screen');
            const gameScreen = document.getElementById('game-screen');
            const scoreboardScreen = document.getElementById('scoreboard-screen');
            
            const loginContainer = document.getElementById('login-container');
            const registerContainer = document.getElementById('register-container');

            function toggleAuth() {
                loginContainer.classList.toggle('hidden');
                registerContainer.classList.toggle('hidden');
            }
            
            function selecmode(mode) {
                modeScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                window.dispatchEvent(new CustomEvent('init-game', { detail: mode }));
            }

            async function showScoreboard() {
                console.log("Starting petition to the scoreboard...");
                modeScreen.classList.add('hidden');
                scoreboardScreen.classList.remove('hidden');
                
                try {
                    const res = await fetch('/scoreboard');
                    const data = await res.json();
                    
                    console.log("Server data received: ", data);
                    
                    if (data.success) {
                        const singleList = document.getElementById('top-single');
                        const pveList = document.getElementById('top-pve');
                        
                        singleList.innerHTML = '';
                        pveList.innerHTML = '';

                        data.topSingle.forEach(u => {
                            const score = u.highScore || 0;
                            singleList.innerHTML += `<li>${u.username}: <b>${score}</b></li>`;
                        });
                        
                        data.topPvE.forEach(u => {
                            const score = u.highscorepve || 0;
                            pveList.innerHTML += `<li>${u.username}: <b>${score}</b></li>`;
                        });
                    }
                } catch (e) {
                    console.error("Error loading /scoreboard:", e);
                    alert("Error loading scores");
                }
            }

            function backToMenu() {
                scoreboardScreen.classList.add('hidden');
                modeScreen.classList.remove('hidden');
            }

            function backToMenuFromGame() {
                window.dispatchEvent(new CustomEvent('stop-game')); 
                gameScreen.classList.add('hidden');
                modeScreen.classList.remove('hidden');
            }

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('reg-username').value;
                const password = document.getElementById('reg-password').value;

                try {
                    const response = await fetch('/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await response.json();
                    if (data.success) {
                        alert("User created");
                        toggleAuth();
                    } else {
                        alert("Register error" + (data.error || "Try another username"));
                    }
                } catch (error) { alert("Connecting error"); }
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    if (response.ok) {
                        authScreen.classList.add('hidden');
                        modeScreen.classList.remove('hidden');
                    } else {
                        alert("Incorrect password or user");
                    }
                } catch (error) { alert("Connection error."); }
            });
        </script>
        
        <script src="game.js" type="module"></script>
    </body>
</html>
